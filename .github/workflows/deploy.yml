name: Deploy Forecast to GitHub Pages

on:
  push:
    branches:
      - main
  schedule:
    - cron: '05 0 * * *'   # 02:05 Europe/Warsaw
    - cron: '45 6 * * *'   # 08:45 Europe/Warsaw
    - cron: '55 17 * * *'  # 19:55 Europe/Warsaw
    - cron: '0 19 * * *' # 21:00 Europe/Warsaw

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository (main branch)
        uses: actions/checkout@v4

      - name: Fetch forecast.json from gh-pages if it exists
        run: |
          git fetch origin gh-pages
          mkdir -p public
          git show origin/gh-pages:forecast.json > forecast.json || echo "{}" > forecast.json

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps

      - name: Run forecast script with retry
        run: |
          for i in 1 2; do
            echo "Attempt $i"
            python src/main.py && exit 0
            sleep 120
          done
          exit 1
      
      - name: upload screensgot
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: debug-screenshots
          path: error_attempt_*.png

      - name: Debug output
        run: |
          echo "== Content of public/forecast_ha.json =="
          cat public/forecast_ha.json || echo "Plik nie znaleziony"
          echo "== Content of public/forecast.json =="
          cat public/forecast.json || echo "Plik nie znaleziony"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
